services:
  php:
    build: .
    ports:
      - "8080:80"
    
    volumes:
      - ./app:/var/www/html/

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobseeker
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: